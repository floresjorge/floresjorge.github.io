name: Update Rental Data (GDL)

on:
  schedule:
    # Every 12 hours: 6:00 AM and 6:00 PM UTC (00:00 and 12:00 CST)
    - cron: "0 6,18 * * *"
  workflow_dispatch:
    inputs:
      zona:
        description: "Target zone"
        required: false
        default: "Guadalajara Centro"
      precio_max:
        description: "Max monthly rent (MXN)"
        required: false
        default: "20000"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rental-monitor-gdl

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: rental-monitor-gdl/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          INMUEBLES24_API_KEY: ${{ secrets.INMUEBLES24_API_KEY }}
        run: |
          python collector.py \
            --zona "${{ github.event.inputs.zona || 'Guadalajara Centro' }}" \
            --precio-max ${{ github.event.inputs.precio_max || '20000' }} \
            --sources demo

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json data/listings.csv data/metadata.json
          git commit -m "chore: update rental listings data [skip ci]"
          git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log outcome
        run: |
          echo "Changed: ${{ steps.changes.outputs.changed }}"
          python -c "
          import json, pathlib
          meta = json.loads(pathlib.Path('data/metadata.json').read_text())
          print(f\"Total listings: {meta['total_anuncios']}\")
          print(f\"Updated: {meta['fecha_actualizacion']}\")
          print(f\"Errors: {meta.get('errores', [])}\")
          "
