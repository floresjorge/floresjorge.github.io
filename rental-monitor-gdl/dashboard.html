<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor de Renta – Guadalajara</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ── Tokens ── */
    :root {
      --bg:          #f4f5f7;
      --surface:     #ffffff;
      --surface-2:   #f0f1f3;
      --border:      #e2e4e8;
      --text:        #1a1d23;
      --text-muted:  #6b7280;
      --primary:     #1d4ed8;
      --primary-bg:  #eff6ff;
      --success:     #16a34a;
      --success-bg:  #f0fdf4;
      --warning:     #d97706;
      --warning-bg:  #fffbeb;
      --danger:      #dc2626;
      --danger-bg:   #fef2f2;
      --neutral-bg:  #f1f5f9;
      --neutral:     #475569;
      --radius:      10px;
      --card-shadow: 0 1px 4px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
      --card-hover:  0 4px 16px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.06);
    }
    [data-theme="dark"] {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface-2:   #22263a;
      --border:      #2e3349;
      --text:        #e8eaf0;
      --text-muted:  #8892a4;
      --primary:     #93c5fd;
      --primary-bg:  #1e2d4a;
      --success:     #4ade80;
      --success-bg:  #0d2818;
      --warning:     #fbbf24;
      --warning-bg:  #2d1f06;
      --danger:      #f87171;
      --danger-bg:   #2d0c0c;
      --neutral-bg:  #1e2433;
      --neutral:     #94a3b8;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; scroll-behavior: smooth; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: var(--bg); color: var(--text); line-height: 1.5; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button { cursor: pointer; font: inherit; border: none; background: none; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .header-inner {
      max-width: 1400px; margin: 0 auto; padding: .75rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    }
    .header-brand h1 { font-size: 1.1rem; font-weight: 700; }
    .header-brand p  { font-size: .75rem; color: var(--text-muted); margin-top: .1rem; }
    .header-controls { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }

    .view-toggle {
      display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .view-btn {
      padding: .38rem .85rem; font-size: .82rem; font-weight: 600;
      background: var(--surface-2); color: var(--text-muted);
      transition: background .15s, color .15s;
    }
    .view-btn.active { background: var(--primary); color: #fff; }
    .view-btn:hover:not(.active) { background: var(--border); }

    .icon-btn {
      padding: .38rem .75rem; font-size: .85rem; font-weight: 500;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); transition: background .15s;
    }
    .icon-btn:hover { background: var(--border); }

    /* ── App shell ── */
    .app { max-width: 1400px; margin: 0 auto; padding: 1.25rem; }

    /* ── Filters ── */
    .filters-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden;
    }
    .filters-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .7rem 1rem; cursor: pointer; user-select: none;
    }
    .filters-header-left { display: flex; align-items: center; gap: .5rem; }
    .filters-title { font-size: .82rem; font-weight: 700; text-transform: uppercase;
                     letter-spacing: .06em; color: var(--text-muted); }
    .filters-active-count {
      background: var(--primary); color: #fff;
      border-radius: 10px; padding: .1rem .45rem; font-size: .72rem; font-weight: 700;
      display: none;
    }
    .filters-active-count.visible { display: inline; }
    .filters-chevron { font-size: .75rem; color: var(--text-muted); transition: transform .2s; }
    .filters-chevron.open { transform: rotate(180deg); }

    .filters-body { padding: 0 1rem 1rem; display: none; }
    .filters-body.open { display: block; }
    .filters-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: .55rem;
    }
    .fg { display: flex; flex-direction: column; gap: .2rem; }
    .fg label { font-size: .76rem; color: var(--text-muted); font-weight: 600; }
    .fg input, .fg select {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 6px; padding: .4rem .6rem; font-size: .875rem; color: var(--text);
      width: 100%; outline: none; transition: border-color .15s;
    }
    .fg input:focus, .fg select:focus { border-color: var(--primary); }
    .fg-full { grid-column: 1 / -1; }
    .fg-full input { font-size: .95rem; padding: .5rem .75rem; }

    .filters-actions {
      margin-top: .75rem; display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    }
    .btn-clear {
      padding: .35rem .8rem; font-size: .82rem; font-weight: 600;
      border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted);
      background: var(--surface-2); transition: border-color .15s, color .15s;
    }
    .btn-clear:hover { border-color: var(--danger); color: var(--danger); }
    #results-count { font-size: .82rem; color: var(--text-muted); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; margin-bottom: .85rem;
    }
    .toolbar-label { font-size: .78rem; color: var(--text-muted); white-space: nowrap; }
    .sort-btn {
      padding: .28rem .65rem; font-size: .78rem; font-weight: 600;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-muted); transition: all .15s;
    }
    .sort-btn.active { background: var(--primary-bg); border-color: var(--primary);
                       color: var(--primary); }
    .sort-btn:hover:not(.active) { background: var(--border); }

    /* ── Cards grid ── */
    #view-cards { display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 1rem; }

    .card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--card-shadow); padding: 1rem;
      display: flex; flex-direction: column; gap: .6rem;
      transition: box-shadow .18s, transform .18s;
    }
    .card:hover { box-shadow: var(--card-hover); transform: translateY(-2px); }

    .card-head {
      display: flex; align-items: flex-start; justify-content: space-between; gap: .5rem;
    }
    .card-tipo {
      font-size: .72rem; font-weight: 700; padding: .18rem .55rem;
      border-radius: 5px; white-space: nowrap;
    }
    .tipo-casa       { background: #e0f2fe; color: #0369a1; }
    .tipo-depto      { background: #f3e8ff; color: #7c3aed; }
    .tipo-otro       { background: var(--neutral-bg); color: var(--neutral); }
    [data-theme="dark"] .tipo-casa  { background: #0c2a40; color: #7dd3fc; }
    [data-theme="dark"] .tipo-depto { background: #2d1052; color: #c4b5fd; }

    .card-score {
      font-size: .72rem; font-weight: 800; padding: .2rem .5rem;
      border-radius: 5px; white-space: nowrap; min-width: 32px; text-align: center;
    }
    .score-hi { background: var(--success-bg); color: var(--success); }
    .score-md { background: var(--warning-bg); color: var(--warning); }
    .score-lo { background: var(--danger-bg);  color: var(--danger); }

    .card-title {
      font-size: .92rem; font-weight: 700; line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-title a { color: var(--text); }
    .card-title a:hover { color: var(--primary); text-decoration: none; }

    .card-price-row {
      display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
    }
    .card-price {
      font-size: 1.2rem; font-weight: 800; color: var(--text);
    }
    .price-currency { font-size: .78rem; font-weight: 400; color: var(--text-muted); }
    .trend {
      font-size: .75rem; font-weight: 700; white-space: nowrap;
    }
    .trend-down { color: var(--success); }
    .trend-up   { color: var(--danger); }
    .sparkline-wrap { display: flex; align-items: center; }

    .card-specs {
      font-size: .82rem; color: var(--text-muted);
      display: flex; gap: .75rem; flex-wrap: wrap;
    }
    .spec { display: flex; align-items: center; gap: .2rem; }

    .card-zone { font-size: .8rem; color: var(--text-muted); }
    .zone-colonia { font-weight: 600; color: var(--text); }

    .card-badges { display: flex; flex-wrap: wrap; gap: .3rem; }
    .badge {
      font-size: .7rem; font-weight: 700; padding: .18rem .5rem;
      border-radius: 4px; white-space: nowrap;
    }
    .badge-pets-yes  { background: var(--success-bg); color: var(--success); }
    .badge-pets-no   { background: var(--danger-bg);  color: var(--danger); }
    .badge-pets-cond { background: var(--warning-bg); color: var(--warning); }
    .badge-pets-unk  { background: var(--neutral-bg); color: var(--neutral); }
    .badge-aval      { background: var(--warning-bg); color: var(--warning); }
    .badge-no-aval   { background: var(--success-bg); color: var(--success); }
    .badge-ja        { background: var(--primary-bg); color: var(--primary); }
    .badge-req       { background: var(--neutral-bg); color: var(--neutral); }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: auto; padding-top: .4rem; border-top: 1px solid var(--border);
    }
    .card-date { font-size: .75rem; color: var(--text-muted); }
    .btn-ver {
      font-size: .78rem; font-weight: 700; padding: .3rem .75rem;
      background: var(--primary); color: #fff; border-radius: 6px;
      transition: opacity .15s;
    }
    .btn-ver:hover { opacity: .85; text-decoration: none; }

    /* ── Map view ── */
    #view-map { display: none; border-radius: var(--radius); overflow: hidden;
                box-shadow: var(--card-shadow); }
    #leaflet-map { height: 600px; width: 100%; }
    .map-legend {
      position: absolute; bottom: 30px; left: 10px; z-index: 999;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: .5rem .75rem; font-size: .78rem;
      box-shadow: var(--card-shadow);
    }
    .map-legend-item { display: flex; align-items: center; gap: .4rem; margin-bottom: .2rem; }
    .map-legend-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,.7);
    }

    /* ── Popup override ── */
    .leaflet-popup-content-wrapper {
      border-radius: 10px !important; box-shadow: 0 4px 16px rgba(0,0,0,.2) !important;
    }
    .leaflet-popup-content { font-size: .85rem; line-height: 1.5; min-width: 200px; }
    .popup-title { font-weight: 700; margin-bottom: .3rem; }
    .popup-price { font-size: 1rem; font-weight: 800; }
    .popup-meta  { font-size: .78rem; color: #666; margin: .2rem 0; }
    .popup-badges { display: flex; flex-wrap: wrap; gap: .2rem; margin: .4rem 0; }
    .popup-link { font-weight: 700; font-size: .8rem; }

    /* ── Empty / error states ── */
    .state-box {
      grid-column: 1 / -1; text-align: center; padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .state-icon { font-size: 3rem; display: block; margin-bottom: 1rem; }
    .state-box h2 { font-size: 1.1rem; color: var(--text); margin-bottom: .5rem; }
    .state-box p  { font-size: .88rem; max-width: 380px; margin: 0 auto; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .app { padding: .75rem; }
      #view-cards { grid-template-columns: 1fr; }
      .header-inner { padding: .6rem .75rem; }
      #leaflet-map { height: 420px; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="header-brand">
      <h1>🏠 Monitor de Renta — Guadalajara</h1>
      <p id="last-updated">Cargando…</p>
    </div>
    <div class="header-controls">
      <div class="view-toggle">
        <button class="view-btn active" id="btn-view-cards">🃏 Tarjetas</button>
        <button class="view-btn"        id="btn-view-map">🗺 Mapa</button>
      </div>
      <button class="icon-btn" id="theme-btn">🌙</button>
    </div>
  </div>
</header>

<div class="app">

  <!-- Filters -->
  <div class="filters-wrap">
    <div class="filters-header" id="filters-toggle">
      <div class="filters-header-left">
        <span class="filters-title">Filtros</span>
        <span class="filters-active-count" id="active-count">0</span>
      </div>
      <span class="filters-chevron" id="filters-chevron">▼</span>
    </div>
    <div class="filters-body open" id="filters-body">
      <div class="filters-grid">
        <div class="fg fg-full">
          <label for="f-search">Búsqueda libre</label>
          <input type="text" id="f-search" placeholder="Título, colonia, descripción…" />
        </div>
        <div class="fg">
          <label for="f-precio">Precio máx (MXN)</label>
          <input type="number" id="f-precio" placeholder="20000" min="0" step="500" />
        </div>
        <div class="fg">
          <label for="f-tipo">Tipo</label>
          <select id="f-tipo"><option value="">Todos</option></select>
        </div>
        <div class="fg">
          <label for="f-zona">Zona</label>
          <select id="f-zona"><option value="">Todas</option></select>
        </div>
        <div class="fg">
          <label for="f-colonia">Colonia</label>
          <select id="f-colonia"><option value="">Todas</option></select>
        </div>
        <div class="fg">
          <label for="f-rec">Recámaras mín.</label>
          <select id="f-rec">
            <option value="">Cualquiera</option>
            <option value="1">1+</option><option value="2">2+</option>
            <option value="3">3+</option><option value="4">4+</option>
          </select>
        </div>
        <div class="fg">
          <label for="f-mascotas">Mascotas</label>
          <select id="f-mascotas">
            <option value="">Cualquiera</option>
            <option value="sí acepta mascotas">Acepta</option>
            <option value="acepta mascotas con restricciones">Con restricción</option>
            <option value="no acepta mascotas">No acepta</option>
            <option value="no especificado">No especificado</option>
          </select>
        </div>
        <div class="fg">
          <label for="f-aval">Aval</label>
          <select id="f-aval">
            <option value="">Cualquiera</option>
            <option value="sí">Requiere</option>
            <option value="no">Sin aval</option>
            <option value="no especificado">No especificado</option>
          </select>
        </div>
        <div class="fg">
          <label for="f-ja">Justicia Alt.</label>
          <select id="f-ja">
            <option value="">Cualquiera</option>
            <option value="sí">Acepta</option>
            <option value="no especificado">No especificado</option>
          </select>
        </div>
        <div class="fg">
          <label for="f-score">Score mín.</label>
          <input type="number" id="f-score" placeholder="0–100" min="0" max="100" />
        </div>
      </div>
      <div class="filters-actions">
        <button class="btn-clear" id="btn-clear">✕ Limpiar</button>
        <span id="results-count"></span>
      </div>
    </div>
  </div>

  <!-- Toolbar / sort -->
  <div class="toolbar">
    <span class="toolbar-label">Ordenar:</span>
    <button class="sort-btn active" data-key="precio_mensual" data-dir="asc">Precio ↑</button>
    <button class="sort-btn" data-key="precio_mensual" data-dir="desc">Precio ↓</button>
    <button class="sort-btn" data-key="score_calidad" data-dir="desc">Score ↓</button>
    <button class="sort-btn" data-key="recamaras" data-dir="desc">Recámaras ↓</button>
    <button class="sort-btn" data-key="prioridad_zona" data-dir="desc">Prioridad ↓</button>
    <button class="sort-btn" data-key="fecha_publicacion" data-dir="desc">Fecha ↓</button>
  </div>

  <!-- Cards -->
  <div id="view-cards">
    <div class="state-box"><span class="state-icon">⏳</span><h2>Cargando…</h2></div>
  </div>

  <!-- Map -->
  <div id="view-map">
    <div id="leaflet-map"></div>
  </div>

</div><!-- .app -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const S = {
  view: 'cards',
  listings: [],
  history: {},
  filtered: [],
  sortKey: 'precio_mensual',
  sortDir: 'asc',
  filtersOpen: true,
  filters: {
    search: '', precio: null, tipo: '', zona: '', colonia: '',
    rec: null, mascotas: '', aval: '', ja: '', score: null,
  },
};

// ═══════════════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════════════
let dark = localStorage.getItem('theme') === 'dark';
applyTheme();
document.getElementById('theme-btn').addEventListener('click', () => {
  dark = !dark;
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  applyTheme();
  if (S.view === 'map' && _map) _map.invalidateSize();
});
function applyTheme() {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = dark ? '☀️' : '🌙';
}

// ═══════════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════════
async function loadData() {
  try {
    const [lRes, mRes, hRes] = await Promise.allSettled([
      fetch('data/listings.json'),
      fetch('data/metadata.json'),
      fetch('data/price_history.json'),
    ]);

    if (mRes.status === 'fulfilled' && mRes.value.ok) {
      renderMeta(await mRes.value.json());
    }
    if (hRes.status === 'fulfilled' && hRes.value.ok) {
      S.history = await hRes.value.json();
    }
    S.listings = (lRes.status === 'fulfilled' && lRes.value.ok)
      ? await lRes.value.json()
      : [];

    populateSelects();
    applyFiltersAndSort();
  } catch (e) {
    showGlobalError(e.message);
  }
}

function renderMeta(m) {
  const dt = m.fecha_actualizacion
    ? new Date(m.fecha_actualizacion).toLocaleString('es-MX', {dateStyle:'medium', timeStyle:'short'})
    : '—';
  document.getElementById('last-updated').textContent =
    `Actualizado: ${dt} · ${m.total_anuncios ?? 0} anuncios · Zona: ${m.zona_objetivo ?? ''} · Máx $${(m.precio_maximo ?? 0).toLocaleString('es-MX')}`;
}

function populateSelects() {
  fill('f-tipo',    uniq(S.listings.map(l => l.tipo)));
  fill('f-zona',    uniq(S.listings.map(l => l.zona)));
  fill('f-colonia', uniq(S.listings.map(l => l.colonia)));
}
function uniq(arr) { return [...new Set(arr.filter(Boolean))].sort(); }
function fill(id, vals) {
  const sel = document.getElementById(id);
  const prev = sel.value;
  sel.innerHTML = '<option value="">Todos</option>';
  vals.forEach(v => { const o = document.createElement('option'); o.value = o.textContent = v; sel.appendChild(o); });
  sel.value = prev;
}

// ═══════════════════════════════════════════════════════════════
// FILTER & SORT
// ═══════════════════════════════════════════════════════════════
function applyFiltersAndSort() {
  const { search, precio, tipo, zona, colonia, rec, mascotas, aval, ja, score } = S.filters;
  const q = search.toLowerCase();

  S.filtered = S.listings.filter(l => {
    if (q) {
      const hay = [l.titulo, l.colonia, l.zona, l.descripcion_corta, l.descripcion_original].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (precio != null && l.precio_mensual != null && l.precio_mensual > precio) return false;
    if (tipo    && l.tipo    !== tipo)    return false;
    if (zona    && l.zona    !== zona)    return false;
    if (colonia && l.colonia !== colonia) return false;
    if (rec  != null && (l.recamaras == null || l.recamaras < rec))   return false;
    if (mascotas && (l.mascotas || '').toLowerCase() !== mascotas)    return false;
    if (aval     && (l.requiere_aval || '').toLowerCase() !== aval)   return false;
    if (ja       && (l.justicia_alternativa || '').toLowerCase() !== ja) return false;
    if (score != null && l.score_calidad < score) return false;
    return true;
  });

  S.filtered.sort((a, b) => {
    let va = a[S.sortKey], vb = b[S.sortKey];
    if (va == null) va = S.sortDir === 'asc' ? Infinity : -Infinity;
    if (vb == null) vb = S.sortDir === 'asc' ? Infinity : -Infinity;
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return (va < vb ? -1 : va > vb ? 1 : 0) * (S.sortDir === 'asc' ? 1 : -1);
  });

  updateActiveCount();
  document.getElementById('results-count').textContent =
    `${S.filtered.length} de ${S.listings.length} anuncio${S.listings.length !== 1 ? 's' : ''}`;

  if (S.view === 'cards') renderCards();
  else renderMap();
}

function updateActiveCount() {
  const { search, precio, tipo, zona, colonia, rec, mascotas, aval, ja, score } = S.filters;
  const n = [search, precio, tipo, zona, colonia, rec, mascotas, aval, ja, score].filter(v => v !== '' && v != null).length;
  const el = document.getElementById('active-count');
  el.textContent = n;
  el.classList.toggle('visible', n > 0);
}

// ═══════════════════════════════════════════════════════════════
// CARDS RENDERER
// ═══════════════════════════════════════════════════════════════
function renderCards() {
  const wrap = document.getElementById('view-cards');
  if (!S.listings.length) { wrap.innerHTML = emptyState('📋', 'Sin anuncios', 'Ejecuta collector.py para generar listings.json'); return; }
  if (!S.filtered.length) { wrap.innerHTML = emptyState('🔍', 'Sin resultados', 'Ajusta los filtros o sube el precio máximo'); return; }
  wrap.innerHTML = S.filtered.map(cardHtml).join('');
}

function cardHtml(l) {
  const tipoClass = l.tipo === 'Casa' ? 'tipo-casa' : l.tipo === 'Departamento' ? 'tipo-depto' : 'tipo-otro';
  const scoreClass = l.score_calidad >= 70 ? 'score-hi' : l.score_calidad >= 40 ? 'score-md' : 'score-lo';

  const priceStr = l.precio_mensual != null
    ? `<span class="card-price">$${l.precio_mensual.toLocaleString('es-MX')}</span><span class="price-currency"> MXN/mes</span>`
    : `<span class="card-price" style="color:var(--text-muted)">A convenir</span>`;

  const trend = priceTrend(l.id);
  const spark = sparklineSvg(l.id);

  const specs = [
    l.recamaras     != null ? `<span class="spec">🛏 ${l.recamaras} rec.</span>` : '',
    l.banos         != null ? `<span class="spec">🚿 ${l.banos}</span>` : '',
    l.metros_cuadrados != null ? `<span class="spec">📐 ${l.metros_cuadrados}m²</span>` : '',
  ].filter(Boolean).join('');

  const badges = [
    petsBadge(l.mascotas),
    avalBadge(l.requiere_aval),
    jaBadge(l.justicia_alternativa),
    depositoBadge(l.requiere_deposito),
    polizaBadge(l.requiere_poliza_juridica),
  ].filter(Boolean).join('');

  const dateStr = l.fecha_publicacion
    ? new Date(l.fecha_publicacion + 'T12:00:00').toLocaleDateString('es-MX', {day:'numeric', month:'short'})
    : '';

  return `<article class="card">
    <div class="card-head">
      <span class="card-tipo ${tipoClass}">${esc(l.tipo || '—')}</span>
      <span class="card-score ${scoreClass}" title="Score calidad: ${l.score_calidad}/100">Q:${l.score_calidad}</span>
    </div>
    <h3 class="card-title"><a href="${esc(l.url || '#')}" target="_blank" rel="noopener">${esc(l.titulo || 'Sin título')}</a></h3>
    <div class="card-price-row">
      ${priceStr}
      ${trend ? `<span class="${trend.cls}">${trend.text}</span>` : ''}
      ${spark ? `<span class="sparkline-wrap">${spark}</span>` : ''}
    </div>
    ${specs ? `<div class="card-specs">${specs}</div>` : ''}
    <div class="card-zone">
      <span class="zone-colonia">${esc(l.colonia || l.zona || '—')}</span>
      ${l.colonia && l.zona ? ` · <span>${esc(l.zona)}</span>` : ''}
    </div>
    ${badges ? `<div class="card-badges">${badges}</div>` : ''}
    <div class="card-footer">
      <span class="card-date">${dateStr}</span>
      <a class="btn-ver" href="${esc(l.url || '#')}" target="_blank" rel="noopener">Ver ↗</a>
    </div>
  </article>`;
}

// ═══════════════════════════════════════════════════════════════
// PRICE HISTORY HELPERS
// ═══════════════════════════════════════════════════════════════
function priceTrend(id) {
  const entry = S.history[id];
  if (!entry?.precios || entry.precios.length < 2) return null;
  const ps = entry.precios;
  const last = ps[ps.length - 1].precio;
  const prev = ps[ps.length - 2].precio;
  const diff = Math.abs(last - prev);
  if (diff === 0) return null;
  return last < prev
    ? { cls: 'trend trend-down', text: `↓ $${diff.toLocaleString('es-MX')}` }
    : { cls: 'trend trend-up',   text: `↑ $${diff.toLocaleString('es-MX')}` };
}

function sparklineSvg(id) {
  const entry = S.history[id];
  if (!entry?.precios || entry.precios.length < 2) return '';
  const vals = entry.precios.map(p => p.precio);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const W = 56, H = 22, pad = 3;
  const pts = vals.map((v, i) => [
    pad + (i / (vals.length - 1)) * (W - pad * 2),
    pad + (1 - (v - min) / range) * (H - pad * 2),
  ]);
  const ptStr = pts.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
  const [lx, ly] = pts[pts.length - 1];
  const last = vals[vals.length - 1], prev = vals[vals.length - 2];
  const stroke = last < prev ? '#16a34a' : last > prev ? '#dc2626' : '#6b7280';
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible" aria-hidden="true">
    <polyline points="${ptStr}" fill="none" stroke="${stroke}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="2.5" fill="${stroke}"/>
  </svg>`;
}

// ═══════════════════════════════════════════════════════════════
// BADGE HELPERS
// ═══════════════════════════════════════════════════════════════
function petsBadge(v) {
  if (!v || v === 'No especificado') return `<span class="badge badge-pets-unk">❓ Mascotas N/E</span>`;
  if (v === 'Sí acepta mascotas')                 return `<span class="badge badge-pets-yes">🐾 Acepta</span>`;
  if (v === 'No acepta mascotas')                 return `<span class="badge badge-pets-no">🚫 No mascotas</span>`;
  return `<span class="badge badge-pets-cond">⚠️ Restricción</span>`;
}
function avalBadge(v) {
  if (!v || v === 'No especificado') return '';
  if (v === 'Sí') return `<span class="badge badge-aval">📄 Aval</span>`;
  if (v === 'No') return `<span class="badge badge-no-aval">✓ Sin aval</span>`;
  return '';
}
function jaBadge(v) {
  if (v === 'Sí') return `<span class="badge badge-ja">⚖️ Just. Alt.</span>`;
  return '';
}
function depositoBadge(v) {
  if (v === 'Sí') return `<span class="badge badge-req">💰 Depósito</span>`;
  return '';
}
function polizaBadge(v) {
  if (v === 'Sí') return `<span class="badge badge-req">📋 Póliza</span>`;
  return '';
}

// ═══════════════════════════════════════════════════════════════
// MAP RENDERER
// ═══════════════════════════════════════════════════════════════
let _map = null;
let _markerLayer = null;

function initMap() {
  if (_map) return;
  if (typeof L === 'undefined') {
    document.getElementById('leaflet-map').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:.9rem">El mapa requiere conexión a internet (Leaflet + OpenStreetMap).</div>';
    return;
  }
  _map = L.map('leaflet-map', { zoomControl: true }).setView([20.6752, -103.3483], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(_map);

  // Legend
  const legend = L.control({ position: 'bottomleft' });
  legend.onAdd = () => {
    const d = L.DomUtil.create('div', 'map-legend');
    d.innerHTML = `
      <div class="map-legend-item"><div class="map-legend-dot" style="background:#16a34a"></div> Score ≥ 70</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:#d97706"></div> Score 40–69</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:#dc2626"></div> Score &lt; 40</div>`;
    return d;
  };
  legend.addTo(_map);
}

function renderMap() {
  initMap();
  if (!_map) return;

  if (_markerLayer) _markerLayer.clearLayers();
  _markerLayer = L.layerGroup().addTo(_map);

  const withCoords = S.filtered.filter(l => l.lat != null && l.lng != null);

  withCoords.forEach(l => {
    const color = l.score_calidad >= 70 ? '#16a34a' : l.score_calidad >= 40 ? '#d97706' : '#dc2626';
    const icon = L.divIcon({
      html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2.5px solid white;box-shadow:0 2px 5px rgba(0,0,0,.35)"></div>`,
      className: '', iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -10],
    });

    const trend = priceTrend(l.id);
    const trendHtml = trend
      ? `<span style="color:${trend.cls.includes('down') ? '#16a34a' : '#dc2626'};font-size:.78rem;font-weight:700"> ${trend.text}</span>`
      : '';

    const popup = `<div class="leaflet-popup-content">
      <div class="popup-title">${esc(l.titulo || 'Sin título')}</div>
      <div class="popup-price">${l.precio_mensual != null ? '$' + l.precio_mensual.toLocaleString('es-MX') + ' MXN/mes' : 'A convenir'}${trendHtml}</div>
      <div class="popup-meta">${esc(l.tipo || '')} · ${esc(l.colonia || l.zona || '')}</div>
      <div class="popup-meta">${[l.recamaras ? '🛏 '+l.recamaras+' rec.' : '', l.banos ? '🚿 '+l.banos : '', l.metros_cuadrados ? '📐 '+l.metros_cuadrados+'m²' : ''].filter(Boolean).join(' · ')}</div>
      <div class="popup-badges">${petsBadge(l.mascotas)}${avalBadge(l.requiere_aval)}${jaBadge(l.justicia_alternativa)}</div>
      <a class="popup-link" href="${esc(l.url || '#')}" target="_blank" rel="noopener">Ver anuncio ↗</a>
    </div>`;

    L.marker([l.lat, l.lng], { icon }).bindPopup(popup).addTo(_markerLayer);
  });

  if (!withCoords.length && S.filtered.length) {
    document.getElementById('leaflet-map').insertAdjacentHTML('afterend',
      '<p style="text-align:center;color:var(--text-muted);padding:.5rem;font-size:.82rem">Ningún anuncio filtrado tiene coordenadas disponibles.</p>');
  }

  setTimeout(() => _map.invalidateSize(), 50);
}

// ═══════════════════════════════════════════════════════════════
// VIEW SWITCHING
// ═══════════════════════════════════════════════════════════════
document.getElementById('btn-view-cards').addEventListener('click', () => switchView('cards'));
document.getElementById('btn-view-map').addEventListener('click',  () => switchView('map'));

function switchView(v) {
  S.view = v;
  document.getElementById('view-cards').style.display = v === 'cards' ? '' : 'none';
  document.getElementById('view-map').style.display   = v === 'map'   ? '' : 'none';
  document.getElementById('btn-view-cards').classList.toggle('active', v === 'cards');
  document.getElementById('btn-view-map').classList.toggle('active',   v === 'map');
  if (v === 'map') renderMap();
  else             renderCards();
}

// ═══════════════════════════════════════════════════════════════
// FILTERS – COLLAPSIBLE PANEL
// ═══════════════════════════════════════════════════════════════
document.getElementById('filters-toggle').addEventListener('click', () => {
  S.filtersOpen = !S.filtersOpen;
  document.getElementById('filters-body').classList.toggle('open', S.filtersOpen);
  document.getElementById('filters-chevron').classList.toggle('open', S.filtersOpen);
});

// ═══════════════════════════════════════════════════════════════
// FILTER WIRING
// ═══════════════════════════════════════════════════════════════
function wire(id, key, parse) {
  document.getElementById(id).addEventListener('input', e => {
    S.filters[key] = parse ? parse(e.target.value) : e.target.value.toLowerCase();
    applyFiltersAndSort();
  });
  document.getElementById(id).addEventListener('change', e => {
    S.filters[key] = parse ? parse(e.target.value) : e.target.value.toLowerCase();
    applyFiltersAndSort();
  });
}
const toNum = v => v ? Number(v) : null;
wire('f-search',  'search',   v => v);
wire('f-precio',  'precio',   toNum);
wire('f-tipo',    'tipo',     v => v);
wire('f-zona',    'zona',     v => v);
wire('f-colonia', 'colonia',  v => v);
wire('f-rec',     'rec',      toNum);
wire('f-mascotas','mascotas', v => v.toLowerCase());
wire('f-aval',    'aval',     v => v.toLowerCase());
wire('f-ja',      'ja',       v => v.toLowerCase());
wire('f-score',   'score',    toNum);

document.getElementById('btn-clear').addEventListener('click', () => {
  Object.keys(S.filters).forEach(k => { S.filters[k] = typeof S.filters[k] === 'string' ? '' : null; });
  ['f-search','f-precio','f-tipo','f-zona','f-colonia','f-rec','f-mascotas','f-aval','f-ja','f-score']
    .forEach(id => { document.getElementById(id).value = ''; });
  applyFiltersAndSort();
});

// ═══════════════════════════════════════════════════════════════
// SORT WIRING
// ═══════════════════════════════════════════════════════════════
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    S.sortKey = btn.dataset.key;
    S.sortDir = btn.dataset.dir;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFiltersAndSort();
  });
});

// ═══════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function emptyState(icon, title, msg) {
  return `<div class="state-box"><span class="state-icon">${icon}</span><h2>${title}</h2><p>${msg}</p></div>`;
}
function showGlobalError(msg) {
  document.getElementById('view-cards').innerHTML = emptyState('❌','Error al cargar datos', msg);
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
loadData();
</script>
